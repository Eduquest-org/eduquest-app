<header class="topbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Busca una sección, curso o estudiante... (Ej: Álgebra)">
  </div>
  <div class="topbar-right">
    <button class="icon-btn" aria-label="Notificaciones">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="dot"></span>
    </button>
    <div class="profile">
      <div class="profile-info">
        <span class="profile-name" data-user-firstname>Cargando...</span>
        <span class="profile-role" data-user-role-label hidden></span>
      </div>
      <div class="avatar" data-user-initials>...</div>
    </div>
  </div>
</header>
