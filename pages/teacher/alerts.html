<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduQuest — Alertas Docente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700;900&family=Sora:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/global/reset.css">
  <link rel="stylesheet" href="../../assets/css/global/variables.css">
  <link rel="stylesheet" href="../../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../../assets/css/pages/teacher-dashboard.css">
</head>
<body>

  <div id="app-preloader">
    <div class="spinner"></div>
    <p>Revisando las alertas de tu aula...</p>
  </div>

  <div id="topbar-container" data-path="../../components/topbar-teacher.html"></div>

  <div class="app-shell">
    <div id="sidebar-container" data-path="../../components/sidebar-teacher.html"></div>

    <main class="teacher-content">

      <div class="page-head">
        <h1>Alertas</h1>
        <p>Avisos automáticos de <strong id="teacher-classroom-name">tu aula</strong>: alumnos en riesgo, bajo rendimiento y grupos que requieren intervención.</p>
      </div>

      <div class="stats-row" style="grid-template-columns:repeat(2,1fr); max-width:520px;">
        <div class="scard"><div class="scard-lbl">Prioridad Alta</div><div class="scard-val col-r" id="stat-high">—</div><div class="scard-sub">Riesgo / crítico</div></div>
        <div class="scard"><div class="scard-lbl">Prioridad Media</div><div class="scard-val" style="color:var(--amber);" id="stat-mid">—</div><div class="scard-sub">Seguimiento sugerido</div></div>
      </div>

      <div class="card">
        <div class="card-h" style="margin-bottom:8px;">Alertas activas</div>
        <div id="alerts-list" class="alert-list"></div>
      </div>

    </main>
  </div>

  <script src="../../assets/js/utils/component-loader.js"></script>
  <script src="../../assets/js/teacher/teacher-common.js"></script>
  <script src="../../assets/js/teacher/alerts.js"></script>

  <script src="../../assets/js/core/storage.js"></script>
  <script src="../../assets/js/core/user-manager.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/router.js"></script>
  <script src="../../assets/js/core/current-user.js"></script>
  <script src="../../assets/js/core/app.js"></script>
</body>
</html>
