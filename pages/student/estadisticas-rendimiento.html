<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduQuest - Dashboard de Rendimiento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../../assets/css/global/reset.css">
    <link rel="stylesheet" href="../../assets/css/global/global.css">
    <link rel="stylesheet" href="../../assets/css/global/variables.css">
    <link rel="stylesheet" href="../../assets/css/components/buttons.css">
    <link rel="stylesheet" href="../../assets/css/pages/student-dashboard.css">
    <link rel="stylesheet" href="../../assets/css/components/feed-card.css">
    <link rel="stylesheet" href="../../assets/css/components/cards.css">
    <link rel="stylesheet" href="../../assets/css/components/loader.css">
    <link rel="stylesheet" href="../../assets/css/components/charts.css">

    <link rel="icon" type="image/x-icon" href="../../assets/img/logos/eduquest-logo.ico">
</head>

<body>
    <div id="topbar-container" data-path="../../components/topbar-students.html"></div>
    <div class="app-shell" id="student-shell">
        <div id="sidebar-container" data-path="../../components/sidebar.html"></div>
        <div class="content">
            <div class="view-header">
                <h1>Dashboard Rendimiento</h1>
                <p>Visualiza tus aciertos y errores por materia.</p>
                <p> </p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Promedio General</h4>
                    <h2 id="stat-promedio">0%</h2>
                </div>

                <div class="stat-card">
                    <h4>Mejor Materia</h4>
                    <h2 id="stat-mejor-materia">-</h2>
                    <span id="stat-mejor-pct">0%</span>
                </div>

                <div class="stat-card">
                    <h4>Materia a Reforzar</h4>
                    <h2 id="stat-peor-materia">-</h2>
                    <span id="stat-peor-pct">0%</span>
                </div>

                <div class="stat-card">
                    <h4>Simulacros</h4>
                    <h2 id="stat-simulacros">0</h2>
                </div>

            </div>

            <div class="charts">

                <div class="card">
                    <h3>Aciertos y Errores por Materia</h3>
                    <canvas id="subjectChart"></canvas>
                </div>

                <div class="card">
                    <h3>Rendimiento Global</h3>
                    <canvas id="globalChart"></canvas>
                </div>

            </div>

            <div class="card">

                <h3>Detalle por Materia</h3>

                <table>

                    <thead>
                        <tr>
                            <th>Materia</th>
                            <th>Aciertos</th>
                            <th>Errores</th>
                            <th>Estado</th>
                        </tr>
                    </thead>

                    <tbody id="table-body-materias">
                        <!-- Dynamic content -->
                    </tbody>

                </table>

            </div>

            <div class="card recommendation">

                <h3>Recomendaciones Automáticas</h3>
                <ul id="list-recomendaciones">
                    <!-- Dynamic content -->
                </ul>

            </div>

        </div>
    </div>

    </div>
    <script src="../../assets/js/components/global-loader.js"></script>
  <script src="../../assets/js/utils/component-loader.js"></script>
  <script src="../../assets/js/core/storage.js"></script>
  <script type="module" src="../../assets/js/core/user-manager.js"></script>
  <script type="module" src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/router.js"></script>
  <script src="../../assets/js/core/current-user.js"></script>
  <script src="../../assets/js/core/app.js"></script>

  <script type="module" src="../../assets/js/student/estadisticas-rendimiento.js"></script>
  <script src="../../assets/js/student/dashboard.js"></script>
  <script src="../../assets/js/student/feed.js"></script>
  <script src="../../assets/js/student/quizzes.js"></script>
</body>

</html>
