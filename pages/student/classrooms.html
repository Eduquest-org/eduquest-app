<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduQuest — Mis Clases</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/variables.css" />
  <link rel="stylesheet" href="../../assets/css/base.css" />
  <link rel="stylesheet" href="../../assets/css/components/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/components/topbar.css" />
  <link rel="stylesheet" href="../../assets/css/components/cards.css" />
  <link rel="stylesheet" href="../../assets/css/components/buttons.css" />
  <link rel="stylesheet" href="../../assets/css/components/modals.css" />
  
  <style>
    /* Estilos específicos para la vista de Mis Clases */
    .classrooms-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .join-class-form {
      display: flex;
      gap: 12px;
    }
    
    .join-class-input {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      width: 200px;
      transition: all 0.2s;
    }
    
    .join-class-input:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(111, 76, 255, 0.15);
    }
    
    .class-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .class-card {
      background: var(--bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    
    .class-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    
    .class-card-header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(111, 76, 255, 0.05), rgba(111, 76, 255, 0.15));
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    
    .class-card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .class-card-course {
      font-size: 13px;
      color: var(--brand);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .class-card-teacher {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--sub);
    }
    
    .class-card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .class-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--sub);
    }
    
    .class-card-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-alt);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--bg);
      border-radius: 16px;
      border: 1px dashed var(--border);
      grid-column: 1 / -1;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .empty-state-desc {
      color: var(--sub);
      font-size: 14px;
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="topbar-container"></div>
      
      <div class="page-container" style="max-width: 1000px; margin: 0 auto;">
        
        <div class="classrooms-header">
          <div>
            <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">Mis Clases</h1>
            <p style="color: var(--sub); font-size: 15px;">Gestiona las aulas virtuales creadas por tus profesores.</p>
          </div>
          
          <form class="join-class-form" id="join-class-form">
            <input type="text" id="join-code-input" class="join-class-input" placeholder="Ej: FIS-A1B2" required autocomplete="off" />
            <button type="submit" class="btn btn-primary" id="btn-join" style="padding: 10px 20px;">
              <span class="btn-text">Unirse a clase</span>
            </button>
          </form>
        </div>

        <div class="class-grid" id="classrooms-grid">
          <!-- Las clases se cargarán aquí -->
          <div class="empty-state">
            <div class="empty-state-icon">🏫</div>
            <h3 class="empty-state-title">Cargando tus clases...</h3>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../../assets/js/components/global-loader.js"></script>
  <script src="../../assets/js/utils/component-loader.js"></script>
  <script src="../../assets/js/core/storage.js"></script>
  <script type="module" src="../../assets/js/core/user-manager.js"></script>
  <script type="module" src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/router.js"></script>
  <script src="../../assets/js/core/current-user.js"></script>
  <script src="../../assets/js/core/app.js"></script>
  <script type="module" src="../../assets/js/student/classrooms.js"></script>
</body>
</html>
